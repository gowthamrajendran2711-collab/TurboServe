version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - MODEL_NAME=meta-llama/Meta-Llama-3-70B-Instruct
      - GPU_MEMORY_UTILIZATION=0.90
  prometheus:
    image: prom/prometheus:v2.52.0
    ports: ["9090:9090"]
    volumes: ["./configs/prometheus.yml:/etc/prometheus/prometheus.yml"]
  grafana:
    image: grafana/grafana:10.4.2
    ports: ["3000:3000"]
